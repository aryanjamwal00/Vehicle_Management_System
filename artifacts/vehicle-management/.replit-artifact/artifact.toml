kind = "web"
previewPath = "/"
title = "Vehicle Management System"
version = "1.0.0"
id = "artifacts/vehicle-management"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18769
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/vehicle-management run dev"

[services.env]
PORT = "18769"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/vehicle-management", "run", "build"]
publicDir = "artifacts/vehicle-management/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
