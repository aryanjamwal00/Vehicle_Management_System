packages:
  "date-fns": "For formatting dates consistently across the app"
  "lucide-react": "For beautiful, consistent iconography"
  "framer-motion": "For page transitions and micro-interactions"
  "recharts": "For the dashboard summary charts"
  "@hookform/resolvers": "For Zod schema validation in forms"
  "react-hook-form": "For form state management"
  "zod": "For defining and validating form schemas"
  "clsx": "For merging conditional Tailwind classes"
  "tailwind-merge": "For safe Tailwind class merging"
images:
  - path: "artifacts/vehicle-management/public/images/dashboard-bg.png"
    description: "Abstract gradient mesh background in deep indigo and white with soft light leaks, suitable for a professional dashboard"
    aspect_ratio: "16:9"
notes:
  - Using generated hooks from @workspace/api-client-react
  - Bookings are managed via their own endpoint
  - Mileage updates happen explicitly via PATCH /api/vehicles/:id/mileage
