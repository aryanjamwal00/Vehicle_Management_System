openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Vehicle Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer management
  - name: vehicleTypes
    description: Vehicle type management
  - name: vehicles
    description: Vehicle management
  - name: bookings
    description: Vehicle booking management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Register a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Customer deleted

  /vehicle-types:
    get:
      operationId: listVehicleTypes
      tags: [vehicleTypes]
      summary: List all vehicle types
      responses:
        "200":
          description: List of vehicle types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleType"
    post:
      operationId: createVehicleType
      tags: [vehicleTypes]
      summary: Create a vehicle type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleTypeRequest"
      responses:
        "201":
          description: Vehicle type created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleType"

  /vehicle-types/{id}:
    put:
      operationId: updateVehicleType
      tags: [vehicleTypes]
      summary: Update vehicle type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleTypeRequest"
      responses:
        "200":
          description: Vehicle type updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleType"
    delete:
      operationId: deleteVehicleType
      tags: [vehicleTypes]
      summary: Delete vehicle type
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Vehicle type deleted

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Register a new vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleRequest"
      responses:
        "201":
          description: Vehicle registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleRequest"
      responses:
        "200":
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Delete vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Vehicle deleted

  /vehicles/{id}/mileage:
    patch:
      operationId: updateVehicleMileage
      tags: [vehicles]
      summary: Update vehicle mileage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMileageRequest"
      responses:
        "200":
          description: Mileage updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}/availability:
    get:
      operationId: checkVehicleAvailability
      tags: [vehicles]
      summary: Check if a vehicle is available for a date range
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          required: true
          schema:
            type: string
        - name: endDate
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityResponse"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Book a vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "409":
          description: Vehicle not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/status:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status (confirm, complete, or cancel)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Customer:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        licenseNumber:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - email
        - phone
        - address
        - licenseNumber
        - createdAt

    CreateCustomerRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        licenseNumber:
          type: string
      required:
        - firstName
        - lastName
        - email
        - phone
        - address
        - licenseNumber

    VehicleType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
      required:
        - id
        - name
        - description
        - category

    CreateVehicleTypeRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
      required:
        - name
        - description
        - category

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        registrationNumber:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        fuelType:
          type: string
        status:
          type: string
        mileageKm:
          type: integer
        vehicleTypeId:
          type: integer
        vehicleTypeName:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - registrationNumber
        - make
        - model
        - year
        - color
        - fuelType
        - status
        - mileageKm
        - vehicleTypeId
        - vehicleTypeName
        - customerId
        - customerName
        - createdAt

    CreateVehicleRequest:
      type: object
      properties:
        registrationNumber:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        fuelType:
          type: string
        status:
          type: string
        mileageKm:
          type: integer
        vehicleTypeId:
          type: integer
        customerId:
          type: integer
      required:
        - registrationNumber
        - make
        - model
        - year
        - color
        - fuelType
        - status
        - vehicleTypeId
        - customerId

    UpdateMileageRequest:
      type: object
      properties:
        mileageKm:
          type: integer
      required:
        - mileageKm

    AvailabilityResponse:
      type: object
      properties:
        available:
          type: boolean
        conflictingBookings:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              startDate:
                type: string
              endDate:
                type: string
              status:
                type: string
            required:
              - id
              - startDate
              - endDate
              - status
      required:
        - available
        - conflictingBookings

    Booking:
      type: object
      properties:
        id:
          type: integer
        vehicleId:
          type: integer
        vehicleName:
          type: string
        registrationNumber:
          type: string
        customerId:
          type: integer
        customerName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        purpose:
          type: string
        notes:
          type: string
        status:
          type: string
        totalDays:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - vehicleId
        - vehicleName
        - registrationNumber
        - customerId
        - customerName
        - startDate
        - endDate
        - purpose
        - status
        - totalDays
        - createdAt

    CreateBookingRequest:
      type: object
      properties:
        vehicleId:
          type: integer
        customerId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        purpose:
          type: string
        notes:
          type: string
      required:
        - vehicleId
        - customerId
        - startDate
        - endDate
        - purpose

    UpdateBookingStatusRequest:
      type: object
      properties:
        status:
          type: string
        mileageOnReturn:
          type: integer
      required:
        - status
